<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kauppa projecti</title>

    <style>
      body {
        margin: 0;
        font-family: Arial, sans-serif;
        background-color: rgb(102, 102, 171);
        color: white;
      }

      header {
        background: #222;
        padding: 15px;
        display: flex;
        justify-content: space-between;
        align-items: center;
      }

      .products {
        display: grid;
        grid-template-columns: repeat(auto-fit, minmax(160px, 1fr));
        gap: 15px;
        padding: 20px;
      }

      .product {
        background: #333;
        padding: 10px;
        border-radius: 10px;
        text-align: center;
      }

      .product h3 {
        margin: 10px 0 5px;
      }

      button {
        margin-top: 10px;
        padding: 6px;
        cursor: pointer;
        border: none;
        border-radius: 5px;
      }

      button:hover {
        background: #ddd;
      }
    </style>
  </head>

  <body>
    <header>
      <h1>My Shop</h1>
      <div>Cart: <span id="cart-count">0</span></div>
    </header>

    <main>
      <div class="products">
        <div class="product">
          <h3>Item 1</h3>
          <p>€10</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 2</h3>
          <p>€15</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 3</h3>
          <p>€12</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 4</h3>
          <p>€8</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 5</h3>
          <p>€20</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 6</h3>
          <p>€5</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 7</h3>
          <p>€18</p>
          <button onclick="addToCart()">Add</button>
        </div>

        <div class="product">
          <h3>Item 8</h3>
          <p>€22</p>
          <button onclick="addToCart()">Add</button>
        </div>
      </div>
    </main>

    <script>
      let cart = 0;

      function addToCart() {
        cart++;
        document.getElementById("cart-count").textContent = cart;
      }
    </script>
  </body>
</html>
